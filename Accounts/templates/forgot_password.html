{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password</title>
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>

<body class="min-h-screen flex items-center justify-center bg-gray-900">

<div class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-sm">

    <h2 class="text-2xl font-bold text-gray-900 text-center mb-6">
        Forgot Password
    </h2>

    <div class="space-y-4">
        <input type="email" id="email"
            placeholder="Enter your email"
            class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none">

        <button onclick="sendReset()"
            class="w-full bg-indigo-600 text-white py-3 rounded-lg font-semibold hover:bg-indigo-700 transition">
            Send Reset Link
        </button>

        <p id="message" class="text-sm text-center mt-2"></p>
    </div>
</div>

<script>
async function sendReset() {
    const email = document.getElementById("email").value;

    const res = await fetch("{% url 'forgot-password' %}", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
        },
        body: JSON.stringify({ email }),
    });

    const data = await res.json();
    
    const message = document.getElementById("message");

    if (res.status === 200) {
        message.className = "text-green-600 text-sm text-center mt-2";
    } else {
        message.className = "text-red-600 text-sm text-center mt-2";
    }

    message.innerText = data.message;
}
</script>
</body>
</html>
