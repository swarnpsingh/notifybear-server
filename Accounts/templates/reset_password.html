{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Reset Password</title>
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>

<body class="min-h-screen flex items-center justify-center bg-gray-900">

<div class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-sm">

    <h2 class="text-2xl font-bold text-gray-900 text-center mb-6">
        Reset Password
    </h2>

    <div class="space-y-4">
        <input type="password" id="password"
            placeholder="New password"
            class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none">

        <input type="password" id="confirm_password"
            placeholder="Confirm password"
            class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none">

        <button onclick="resetPassword()"
            class="w-full bg-indigo-600 text-white py-3 rounded-lg font-semibold hover:bg-indigo-700 transition">
            Reset Password
        </button>

        <p id="message" class="text-sm text-center mt-2"></p>
    </div>
</div>

<script>
const uid = "{{ uid }}";
const token = "{{ token }}";

async function resetPassword() {
    const password = document.getElementById("password").value;
    const confirm_password = document.getElementById("confirm_password").value;

    const message = document.getElementById("message");
    if (password !== confirm_password) {
        message.innerText = "Passwords do not match";
        message.className = "text-red-600 text-sm text-center mt-2";
        return;
    }

    const res = await fetch("{% url 'reset-password' %}", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
        },
        body: JSON.stringify({
            uid: uid,
            token: token,
            password: password,
        }),
    });

    const data = await res.json();

    if (res.status === 200) {
        message.className = "text-green-600 text-sm text-center mt-2";
        setTimeout(() => window.location.href = "/", 1500);
    } else {
        message.className = "text-red-600 text-sm text-center mt-2";
    }
    message.innerText = data.message || data.error;
}
</script>
</body>
</html>
